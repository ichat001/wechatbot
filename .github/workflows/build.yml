name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write          # 允许创建 Release 和推送 tag

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build n8n_bot
        run: cargo build --release --example n8n_bot

      - name: Generate timestamp tag and release name
        id: vars
        shell: pwsh
        run: |
          $ts = Get-Date -Format "yyyyMMdd-HHmmss"
          echo "tag=n8n-bot-$ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "name=n8n_bot $ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          files: rust/target/release/examples/n8n_bot.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
