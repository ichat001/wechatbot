name: Build Windows EXE (with version, China time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # ---------- 生成版本号（北京时间）----------
      - name: Set version from Beijing time
        shell: pwsh
        run: |
          # 转换为北京时间
          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById("China Standard Time")
          $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)

          $major = ($now.Year % 100).ToString()
          $minor = $now.Month.ToString("00")
          $build = $now.Day.ToString("00")
          $revision = ($now.Hour * 100 + $now.Minute).ToString()

          echo "APP_VERSION_MAJOR=$major" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_MINOR=$minor" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_BUILD=$build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_REVISION=$revision" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "📦 Beijing version: $major.$minor.$build.$revision"

      # ---------- 编译 ----------
      - name: Build n8n_bot
        run: cargo build --release --example n8n_bot

      # ---------- 生成 Release 标签（北京时间）----------
      - name: Generate tag and release name (Beijing time)
        id: vars
        shell: pwsh
        run: |
          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById("China Standard Time")
          $now = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)
          $ts = $now.ToString("yyyyMMdd-HHmmss")

          echo "tag=n8n-bot-$ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "name=n8n_bot $ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ---------- 发布 Release ----------
      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          files: rust/target/release/examples/n8n_bot.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
