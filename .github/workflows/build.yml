name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build echo_bot
        run: cargo build --release --example echo_bot

      - name: List output
        run: dir target\release\examples

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: echo_bot-windows
          path: rust/target/release/examples/echo_bot.exe
