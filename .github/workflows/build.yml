name: Build Windows EXE (with version)

on:
  workflow_dispatch:

permissions:
  contents: write          # 允许创建 Release 和推送 tag

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # ---------- 生成动态版本号，写入环境变量 ----------
      - name: Set version from timestamp
        shell: pwsh
        run: |
          $now = Get-Date
          $major = ($now.Year % 100).ToString()          # 年份后两位，如 26
          $minor = $now.Month.ToString("00")             # 月，如 07
          $build = $now.Day.ToString("00")               # 日，如 18
          $revision = ($now.Hour * 100 + $now.Minute).ToString()   # 时分，如 1430

          echo "APP_VERSION_MAJOR=$major" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_MINOR=$minor" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_BUILD=$build" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APP_VERSION_REVISION=$revision" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "📦 Version will be: $major.$minor.$build.$revision"

      # ---------- 编译（build.rs 会自动读取上面的环境变量）----------
      - name: Build n8n_bot
        run: cargo build --release --example n8n_bot

      # ---------- 生成 Release 标签和名称（保留原有风格）----------
      - name: Generate timestamp tag and release name
        id: vars
        shell: pwsh
        run: |
          $ts = Get-Date -Format "yyyyMMdd-HHmmss"
          echo "tag=n8n-bot-$ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "name=n8n_bot $ts" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ---------- 发布 Release ----------
      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          files: rust/target/release/examples/n8n_bot.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
